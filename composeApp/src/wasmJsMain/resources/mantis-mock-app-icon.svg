<svg xmlns:xlink="http://www.w3.org/1999/xlink" id="svg-app-icon" viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="ai-bg" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#1E2030"/>
                                <stop offset="100%" stop-color="#0B0C10"/>
                            </linearGradient>
                            <linearGradient id="mantis-green" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00FF87"/>
                                <stop offset="100%" stop-color="#60EFFF"/>
                            </linearGradient>
                            <linearGradient id="mantis-pink" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FF0844"/>
                                <stop offset="100%" stop-color="#FFB199"/>
                            </linearGradient>
                            <linearGradient id="mantis-glass" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="rgba(0, 255, 135, 0.15)"/>
                                <stop offset="100%" stop-color="rgba(96, 239, 255, 0.05)"/>
                            </linearGradient>
                            <filter id="ai-glow" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur stdDeviation="16" result="blur"/>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                            </filter>
                            <filter id="ai-shadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.6"/>
                            </filter>
                        </defs>
                        
                        <!-- Outer App Icon Container (Squircle) -->
                        <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#ai-bg)" stroke="#2A2D3E" stroke-width="2" filter="url(#ai-shadow)"/>
                        
                        <!-- Background Glow behind Mantis -->
                        <circle cx="256" cy="256" r="120" fill="#00FF87" opacity="0.15" filter="url(#ai-glow)"/>
                        
                        <!-- Core Icon: The Cyber Mantis -->
                        <g filter="url(#ai-glow)">
                            <!-- Antennae (Signal Interceptors) -->
                            <path d="M 206 160 Q 180 110 146 86" stroke="url(#mantis-green)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.8"/>
                            <path d="M 306 160 Q 332 110 366 86" stroke="url(#mantis-green)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.8"/>
                            
                            <!-- Mantis Claws formed perfectly by Code Brackets: < and > -->
                            <!-- Left Bracket < -->
                            <path d="M 226 380 L 136 280 L 216 200" stroke="url(#mantis-green)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                            <!-- Right Bracket > -->
                            <path d="M 286 380 L 376 280 L 296 200" stroke="url(#mantis-green)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                            
                            <!-- Mantis Head (Glassmorphism Triangle) -->
                            <path d="M 186 160 Q 256 180 326 160 L 256 230 Z" fill="url(#mantis-glass)" stroke="url(#mantis-green)" stroke-width="8" stroke-linejoin="round"/>
                            
                            <!-- Glowing Cyber Eyes -->
                            <circle cx="220" cy="184" r="10" fill="#60EFFF"/>
                            <circle cx="292" cy="184" r="10" fill="#60EFFF"/>
                            
                            <!-- Intercepted Data Payload (The Mocked Node) -->
                            <circle cx="256" cy="290" r="28" fill="url(#mantis-pink)"/>
                            
                            <!-- API Data Sparks -->
                            <circle cx="206" cy="250" r="6" fill="#00FF87"/>
                            <circle cx="306" cy="330" r="8" fill="#FEE140"/>
                            <circle cx="256" cy="350" r="5" fill="#60EFFF"/>
                        </g>
                    </svg>